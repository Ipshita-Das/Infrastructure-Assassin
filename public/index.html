<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>A.E.G.I.S. | Infrastructure Assassin</title>
        <style>
            body {
                background-color: #0d1117;
                color: #c9d1d9;
                font-family: "Courier New", Courier, monospace;
                padding: 40px;
                margin: 0;
            }
            h1 {
                color: #00ffcc;
                border-bottom: 1px solid #30363d;
                padding-bottom: 10px;
                text-transform: uppercase;
                letter-spacing: 2px;
            }
            .dashboard {
                margin-top: 30px;
                display: flex;
                flex-direction: column;
                gap: 15px;
            }
            .card {
                background-color: #161b22;
                border: 1px solid #30363d;
                padding: 20px;
                border-left: 4px solid #8b949e;
            }
            .terminate-flag {
                border-left-color: #ff7b72;
            }
            .keep-flag {
                border-left-color: #3fb950;
            }
            .metadata {
                color: #8b949e;
                font-size: 0.9em;
                margin-bottom: 15px;
            }
            button {
                background: transparent;
                border: 1px solid #00ffcc;
                color: #00ffcc;
                padding: 8px 16px;
                cursor: pointer;
                font-family: inherit;
                text-transform: uppercase;
                transition: all 0.2s;
            }
            button:hover {
                background: #00ffcc;
                color: #0d1117;
            }
        </style>
    </head>
    <body>
        <h1>Command Center // Resource Audit</h1>
        <p>Awaiting autonomous agent scan...</p>

        <div id="results" class="dashboard"></div>

        <script>
            async function runAudit() {
                const resultsDiv = document.getElementById("results");
                resultsDiv.innerHTML =
                    '<p style="color: #f2cc60;">[RUNNING] Interfacing with local LLM engine...</p>';

                try {
                    const response = await fetch("/api/audit");
                    const data = await response.json();

                    resultsDiv.innerHTML = ""; // Clear loading text

                    data.forEach((item) => {
                        const card = document.createElement("div");
                        card.className = `card ${item.recommended_action === "TERMINATE" ? "terminate-flag" : "keep-flag"}`;

                        card.innerHTML = `
                        <h3>${item.resource_name} (${item.resource_type})</h3>
                        <div class="metadata">
                            OWNER: ${item.employee_name} | COST: $${item.monthly_cost}/mo | IDLE: ${item.days_since_last_login} days
                        </div>
                        <p>AGENT DIRECTIVE: <strong style="color: ${item.recommended_action === "TERMINATE" ? "#ff7b72" : "#3fb950"}">${item.recommended_action}</strong></p>
                        ${item.recommended_action === "TERMINATE" ? `<button onclick="alert('API Call: Shutting down ${item.resource_name}')">Approve Termination</button>` : ""}
                    `;
                        resultsDiv.appendChild(card);
                    });
                } catch (error) {
                    resultsDiv.innerHTML =
                        '<p style="color: #ff7b72;">[ERROR] Failed to establish neural link to backend.</p>';
                }
            }

            // Run the audit on page load
            window.onload = runAudit;
        </script>
    </body>
</html>
